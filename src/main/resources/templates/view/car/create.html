<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <meta charset="UTF-8">
    <title th:text="${car.carID == null ? 'Create Car' : 'Update Car'}">Create Car</title>
</head>
<body>
<main layout:fragment="content">
    <div class="page-header">
        <div>
            <div class="page-eyebrow">Fleet editor</div>
            <h1 class="page-title" th:text="${car.carID == null ? 'Create New Car' : 'Update Car'}">Create New Car</h1>
            <p class="page-subtitle" th:text="${car.carID == null ? 'Add a vehicle to the rental inventory.' : 'Refresh vehicle details and status.'}">Add a vehicle to the rental inventory.</p>
        </div>
        <a th:href="@{/car/list}" class="btn-outline-modern">
            <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
            Back to list
        </a>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
        <i data-lucide="check-circle" class="me-2" style="width: 18px; height: 18px;"></i>
        Car has been saved successfully.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="surface">
        <div class="surface-header">
            <h5 class="mb-1">Vehicle information</h5>
            <p class="mb-0 text-muted small">Use concise, searchable values for the management table.</p>
        </div>
        <div class="surface-body">
            <form th:action="@{${car.carID == null ? '/car/create' : '/car/update'}}" th:object="${car}" method="post">
                <input type="hidden" th:if="${car.carID != null}" th:field="*{carID}" />

                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="carName" class="form-label-modern">Car Name</label>
                        <input type="text" id="carName" th:field="*{carName}" class="form-control-modern" placeholder="Toyota Camry 2024" required>
                        <div th:if="${#fields.hasErrors('carName')}" th:errors="*{carName}" class="field-error"></div>
                    </div>
                    <div class="col-md-6">
                        <label for="producer" class="form-label-modern">Producer</label>
                        <select id="producer" th:field="*{producer}" class="form-select-modern" required>
                            <option value="">Select producer</option>
                            <option th:each="p : ${producers}" th:value="${p.producerID}" th:text="${p.producerName}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="carModelYear" class="form-label-modern">Model Year</label>
                        <input type="number" id="carModelYear" th:field="*{carModelYear}" class="form-control-modern" placeholder="2024" required>
                    </div>
                    <div class="col-md-4">
                        <label for="color" class="form-label-modern">Color</label>
                        <input type="text" id="color" th:field="*{color}" class="form-control-modern" placeholder="Black" required>
                    </div>
                    <div class="col-md-4">
                        <label for="capacity" class="form-label-modern">Capacity</label>
                        <input type="number" id="capacity" th:field="*{capacity}" class="form-control-modern" placeholder="4" required>
                    </div>
                    <div class="col-md-4">
                        <label for="rentPrice" class="form-label-modern">Rent Price ($/day)</label>
                        <input type="number" step="0.01" id="rentPrice" th:field="*{rentPrice}" class="form-control-modern" placeholder="120" required>
                    </div>
                    <div class="col-md-4">
                        <label for="importDate" class="form-label-modern">Import Date</label>
                        <input type="date" id="importDate" th:field="*{importDate}" class="form-control-modern" required>
                    </div>
                    <div class="col-md-4">
                        <label for="status" class="form-label-modern">Status</label>
                        <select id="status" th:field="*{status}" class="form-select-modern" required>
                            <option value="AVAILABLE">Available</option>
                            <option value="RENTED">Rented</option>
                            <option value="MAINTENANCE">Maintenance</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label for="description" class="form-label-modern">Description</label>
                        <textarea id="description" th:field="*{description}" class="form-control-modern" rows="4" placeholder="Features, condition notes, fuel type, and other details." required></textarea>
                    </div>
                </div>

                <div class="mt-4 d-flex flex-column flex-sm-row justify-content-end gap-2 border-top pt-4">
                    <a th:href="@{/car/list}" class="btn-outline-modern">Cancel</a>
                    <button type="submit" class="btn-primary-modern">
                        <i data-lucide="save" style="width: 18px; height: 18px;"></i>
                        <span th:text="${car.carID == null ? 'Save Car' : 'Update Car'}">Save Car</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
