<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <meta charset="UTF-8">
    <title>Create Car</title>
</head>
<body>
<main layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">
            <div class="mb-4 d-flex align-items-center gap-3">
                <a th:href="@{/admin/cars}" class="btn-outline-modern text-decoration-none border-0 px-2">
                    <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
                </a>
                <div>
                    <h3 class="mb-1 text-dark fw-bold" th:text="${car.carID == null ? 'Create New Car' : 'Update Car'}">Create New Car</h3>
                    <p class="text-muted mb-0" th:text="${car.carID == null ? 'Enter the details of the new vehicle' : 'Update vehicle details'}">Enter the details of the new vehicle</p>
                </div>
            </div>

            <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show mb-4" role="alert" style="border-radius: var(--radius-lg);">
                <i data-lucide="check-circle" class="me-2" style="width: 18px; height: 18px; display: inline-block; vertical-align: text-bottom;"></i>
                Car has been saved successfully!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card-modern">
                <form th:action="@{${car.carID == null ? '/car/create' : '/car/update'}}" th:object="${car}" method="post">
                    <input type="hidden" th:if="${car.carID != null}" th:field="*{carID}" />
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="carName" class="form-label-modern">Car Name</label>
                            <input type="text" id="carName" th:field="*{carName}" class="form-control-modern" placeholder="e.g. Toyota Camry 2024" required/>
                            <div th:if="${#fields.hasErrors('carName')}" th:errors="*{carName}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="producer" class="form-label-modern">Producer</label>
                            <select id="producer" th:field="*{producer}" class="form-control-modern" style="background-color: white;" required>
                                <option value="">-- Select Producer --</option>
                                <option th:each="p : ${producers}" th:value="${p.producerID}" th:text="${p.producerName}"></option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="carModelYear" class="form-label-modern">Model Year</label>
                            <input type="number" id="carModelYear" th:field="*{carModelYear}" class="form-control-modern" required/>
                        </div>
                        
                        <div class="col-md-4">
                            <label for="color" class="form-label-modern">Color</label>
                            <input type="text" id="color" th:field="*{color}" class="form-control-modern" required/>
                        </div>
                        
                        <div class="col-md-4">
                            <label for="capacity" class="form-label-modern">Capacity (Seats)</label>
                            <input type="number" id="capacity" th:field="*{capacity}" class="form-control-modern" required/>
                        </div>

                        <div class="col-md-4">
                            <label for="rentPrice" class="form-label-modern">Rent Price ($/day)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted" style="border: 1px solid var(--color-border); border-top-left-radius: var(--radius-lg); border-bottom-left-radius: var(--radius-lg);">$</span>
                                <input type="number" step="0.01" id="rentPrice" th:field="*{rentPrice}" class="form-control-modern form-control border-start-0" style="border-top-left-radius: 0; border-bottom-left-radius: 0;" required/>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="importDate" class="form-label-modern">Import Date</label>
                            <input type="date" id="importDate" th:field="*{importDate}" class="form-control-modern" required/>
                        </div>

                        <div class="col-md-4">
                            <label for="status" class="form-label-modern">Status</label>
                            <select id="status" th:field="*{status}" class="form-control-modern" style="background-color: white;" required>
                                <option value="AVAILABLE">Available</option>
                                <option value="RENTED">Rented</option>
                                <option value="MAINTENANCE">Maintenance</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label-modern">Description</label>
                            <textarea id="description" th:field="*{description}" class="form-control-modern" rows="4" placeholder="Features, conditions, etc." required></textarea>
                        </div>
                    </div>
                    
                    <div class="mt-5 d-flex justify-content-end border-top pt-4">
                        <button type="submit" class="btn-primary-modern">
                            <i data-lucide="save" style="width: 18px; height: 18px;"></i>
                            <span th:text="${car.carID == null ? 'Save Car' : 'Update Car'}">Save Car</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
