<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Car</title>
</head>
<body>
    <h2>Create New Car</h2>
    
    <div th:if="${param.success}">
        <p style="color: green; font-weight: bold;">Car has been saved successfully!</p>
    </div>

    <form th:action="@{/car/create}" th:object="${car}" method="post">
        <div style="margin-bottom: 10px;">
            <label for="carName">Car Name:</label><br/>
            <input type="text" id="carName" th:field="*{carName}" required/>
            <p th:if="${#fields.hasErrors('carName')}" th:errors="*{carName}" style="color: red; font-size: 0.9em; margin-top: 5px;"></p>
        </div>
        
        <div style="margin-bottom: 10px;">
            <label for="carModelYear">Car Model Year:</label><br/>
            <input type="number" id="carModelYear" th:field="*{carModelYear}" required/>
        </div>
        
        <div style="margin-bottom: 10px;">
            <label for="color">Color:</label><br/>
            <input type="text" id="color" th:field="*{color}" required/>
        </div>
        
        <div style="margin-bottom: 10px;">
            <label for="capacity">Capacity:</label><br/>
            <input type="number" id="capacity" th:field="*{capacity}" required/>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="description">Description:</label><br/>
            <textarea id="description" th:field="*{description}" required></textarea>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="importDate">Import Date:</label><br/>
            <input type="date" id="importDate" th:field="*{importDate}" required/>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="rentPrice">Rent Price:</label><br/>
            <input type="number" step="0.01" id="rentPrice" th:field="*{rentPrice}" required/>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="status">Status:</label><br/>
            <input type="text" id="status" th:field="*{status}" required/>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="producer">Producer:</label><br/>
            <select id="producer" th:field="*{producer}" required>
                <option value="">-- Select Producer --</option>
                <option th:each="p : ${producers}" th:value="${p.producerID}" th:text="${p.producerName}"></option>
            </select>
        </div>
        
        <div style="margin-top: 20px;">
            <button type="submit">Save Car</button>
        </div>
    </form>
</body>
</html>
