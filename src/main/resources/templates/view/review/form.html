<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user}">
<head>
    <meta charset="UTF-8">
    <title>Submit Review</title>
</head>
<body>
<main layout:fragment="content">
    <div class="page-header">
        <div>
            <div class="page-eyebrow">Feedback</div>
            <h1 class="page-title">Submit Review</h1>
            <p class="page-subtitle">How was your experience with <span class="fw-bold" th:text="${carRental.car.carName}"></span>?</p>
        </div>
        <a th:href="@{/carRental/detail/{id}(id=${carRental.carRenID})}" class="btn btn-outline-secondary">
            <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
            Back to Rental
        </a>
    </div>

    <div class="surface">
        <div class="surface-header">
            <h5 class="mb-0">Rental Details</h5>
        </div>
        <div class="px-4 py-3 border-bottom bg-light">
            <div class="row">
                <div class="col-md-4">
                    <p class="mb-1 text-muted small">Car</p>
                    <p class="fw-medium mb-0" th:text="${carRental.car.carName}"></p>
                </div>
                <div class="col-md-4">
                    <p class="mb-1 text-muted small">Duration</p>
                    <p class="fw-medium mb-0"
                       th:text="|${#temporals.format(carRental.pickupDate, 'dd/MM/yyyy')} to ${#temporals.format(carRental.returnDate, 'dd/MM/yyyy')}|"></p>
                </div>
                <div class="col-md-4">
                    <p class="mb-1 text-muted small">Total Paid</p>
                    <p class="fw-medium mb-0" th:text="${#numbers.formatDecimal(carRental.rentPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></p>
                </div>
            </div>
        </div>
        
        <div class="p-4">
            <form th:action="@{/review/submit}" method="post" th:object="${reviewDTO}">
                <input type="hidden" th:field="*{carRenID}">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Rating</label>
                    <div class="d-flex gap-3 align-items-center">
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" th:field="*{reviewStar}" id="star5" value="5" required checked>
                            <label class="form-check-label text-warning" for="star5">
                                <i data-lucide="star" style="width: 20px; fill: currentColor;"></i> 5
                            </label>
                        </div>
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" th:field="*{reviewStar}" id="star4" value="4">
                            <label class="form-check-label text-warning" for="star4">
                                <i data-lucide="star" style="width: 20px; fill: currentColor;"></i> 4
                            </label>
                        </div>
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" th:field="*{reviewStar}" id="star3" value="3">
                            <label class="form-check-label text-warning" for="star3">
                                <i data-lucide="star" style="width: 20px; fill: currentColor;"></i> 3
                            </label>
                        </div>
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" th:field="*{reviewStar}" id="star2" value="2">
                            <label class="form-check-label text-warning" for="star2">
                                <i data-lucide="star" style="width: 20px; fill: currentColor;"></i> 2
                            </label>
                        </div>
                        <div class="form-check form-check-inline m-0">
                            <input class="form-check-input" type="radio" th:field="*{reviewStar}" id="star1" value="1">
                            <label class="form-check-label text-warning" for="star1">
                                <i data-lucide="star" style="width: 20px; fill: currentColor;"></i> 1
                            </label>
                        </div>
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('reviewStar')}" th:errors="*{reviewStar}"></div>
                </div>

                <div class="mb-4">
                    <label for="comment" class="form-label fw-bold">Your Review</label>
                    <textarea class="form-control" th:classappend="${#fields.hasErrors('comment')} ? 'is-invalid' : ''" id="comment" th:field="*{comment}" rows="4" placeholder="Tell us about your experience..." required maxlength="500"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}"></div>
                    <div class="form-text" th:unless="${#fields.hasErrors('comment')}">Maximum 500 characters.</div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/carRental/detail/{id}(id=${carRental.carRenID})}" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">Submit Review</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
