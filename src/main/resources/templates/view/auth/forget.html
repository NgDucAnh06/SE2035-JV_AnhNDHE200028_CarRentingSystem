<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FUCarRenting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="auth-shell">
    <section class="auth-showcase">
        <a class="auth-logo" th:href="@{/auth/signin}">
            <span class="brand-mark"><i data-lucide="car-front" style="width: 21px; height: 21px;"></i></span>
            FUCarRenting
        </a>
        <div class="auth-visual">
            <p class="page-eyebrow text-white-50">Account recovery</p>
            <h1>Get back into your rental workspace.</h1>
            <p>Request a reset code using the email connected to your account.</p>
        </div>
        <small class="text-white-50">Keep rental access moving.</small>
    </section>

    <section class="auth-panel">
        <div class="auth-card compact">
            <div class="auth-header">
                <h2>Forgot password</h2>
                <p>Enter your email to receive a confirmation code.</p>
            </div>
            <form method="post">
                <div class="mb-4">
                    <label class="form-label-modern" for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control-modern" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn-primary-modern w-100">
                    Send request
                    <i data-lucide="mail" style="width: 18px; height: 18px;"></i>
                </button>
                <div class="auth-footer">
                    Remembered it? <a th:href="@{/auth/signin}" class="fw-bold text-decoration-none">Sign in</a>
                </div>
            </form>
        </div>
    </section>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
