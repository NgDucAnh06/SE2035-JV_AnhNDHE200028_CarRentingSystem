<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Sign in</title>
</head>
<body>
<form action="" method="post">

    <h3>Sign in</h3>

    <div>
        <span>Username</span>
        <input type="text" name="username">
    </div>
    <br>
    <div>
        <span>Password</span>
        <input type="password" name="password">
    </div>

    <input type="submit" value="Sign in">

</form>
</body>
</html>
