<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Code - FUCarRenting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="auth-shell">
    <section class="auth-showcase">
        <a class="auth-logo" th:href="@{/auth/signin}">
            <span class="brand-mark"><i data-lucide="car-front" style="width: 21px; height: 21px;"></i></span>
            FUCarRenting
        </a>
        <div class="auth-visual">
            <p class="page-eyebrow text-white-50">Verification</p>
            <h1>Confirm the code from your inbox.</h1>
            <p>After verification, you can reset your password and return to your account.</p>
        </div>
        <small class="text-white-50">Secure account recovery.</small>
    </section>

    <section class="auth-panel">
        <div class="auth-card compact">
            <div class="auth-header">
                <h2>Confirm code</h2>
                <p>Enter the numeric code sent to your email.</p>
            </div>
            <form method="post">
                <div class="mb-4">
                    <label class="form-label-modern" for="code">Code</label>
                    <input type="number" id="code" name="code" class="form-control-modern" placeholder="000000" required>
                </div>
                <button type="submit" class="btn-primary-modern w-100">
                    Reset password
                    <i data-lucide="shield-check" style="width: 18px; height: 18px;"></i>
                </button>
            </form>
        </div>
    </section>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
