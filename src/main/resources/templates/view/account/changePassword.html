<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user}">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
</head>
<body>
<main layout:fragment="content">
    <div class="page-header">
        <div>
            <div class="page-eyebrow">Security</div>
            <h1 class="page-title">Change Password</h1>
            <p class="page-subtitle">Update your password to keep your account secure.</p>
        </div>
    </div>

    <div class="surface">
        <div class="surface-header">
            <h5 class="mb-1">Password settings</h5>
            <p class="mb-0 text-muted small">Enter your current password and choose a new one.</p>
        </div>
        <div class="surface-body">
            <!-- Success message -->
            <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-4">
                <i data-lucide="check-circle" style="width: 16px; height: 16px;"></i>
                <span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/account/changePassword}" th:object="${changePasswordDTO}" method="post">
                <!-- Global errors -->
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-4">
                    <div th:each="err : ${#fields.globalErrors()}" class="d-flex align-items-center gap-2">
                        <i data-lucide="alert-circle" style="width: 16px; height: 16px;"></i>
                        <span th:text="${err}"></span>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label-modern" for="oldPassword">Current Password</label>
                        <input type="password" id="oldPassword" th:field="*{oldPassword}" class="form-control-modern" placeholder="Enter current password">
                        <div th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}" class="field-error"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-modern" for="newPassword">New Password</label>
                        <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control-modern" placeholder="Enter new password">
                        <div th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="field-error"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-modern" for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control-modern" placeholder="Confirm new password">
                        <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="field-error"></div>
                    </div>
                </div>

                <div class="mt-4 d-flex flex-column flex-sm-row justify-content-end gap-2 border-top pt-4">
                    <a th:href="@{/home}" class="btn-outline-modern">Cancel</a>
                    <button type="submit" class="btn-primary-modern">
                        <i data-lucide="lock" style="width: 18px; height: 18px;"></i>
                        Change password
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
