<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user}">
<head>
    <meta charset="UTF-8">
    <title>Update Profile</title>
</head>
<body>
<main layout:fragment="content">
    <div class="page-header">
        <div>
            <div class="page-eyebrow">Profile</div>
            <h1 class="page-title">Update Profile</h1>
            <p class="page-subtitle">Keep contact, identity, and licence information accurate before creating rentals.</p>
        </div>
        <a th:href="@{/carRental/rentalRegister}" class="btn-outline-modern">
            <i data-lucide="car-front" style="width: 18px; height: 18px;"></i>
            Rent a car
        </a>
    </div>

    <div class="surface">
        <div class="surface-header">
            <h5 class="mb-1">Personal information</h5>
            <p class="mb-0 text-muted small">Changes are saved to your customer profile.</p>
        </div>
        <div class="surface-body">
            <form th:action="@{/account/updateProfile}" th:object="${updateProfileDTO}" method="post">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-4">
                    <div th:each="err : ${#fields.globalErrors()}" class="d-flex align-items-center gap-2">
                        <i data-lucide="alert-circle" style="width: 16px; height: 16px;"></i>
                        <span th:text="${err}"></span>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label-modern" for="fullName">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="field-error"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-modern" for="email">Email Address</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-modern" for="mobile">Mobile Phone</label>
                        <input type="tel" id="mobile" th:field="*{mobile}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}" class="field-error"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-modern" for="birthday">Birthday</label>
                        <input type="date" id="birthday" th:field="*{birthday}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}" class="field-error"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-modern" for="identityCard">Identity Card</label>
                        <input type="text" id="identityCard" th:field="*{identityCard}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('identityCard')}" th:errors="*{identityCard}" class="field-error"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-modern" for="licenceNum">Licence Number</label>
                        <input type="text" id="licenceNum" th:field="*{licenceNum}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('licenceNum')}" th:errors="*{licenceNum}" class="field-error"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-modern" for="licenceDate">Licence Date</label>
                        <input type="date" id="licenceDate" th:field="*{licenceDate}" class="form-control-modern">
                        <div th:if="${#fields.hasErrors('licenceDate')}" th:errors="*{licenceDate}" class="field-error"></div>
                    </div>
                </div>

                <div class="mt-4 d-flex flex-column flex-sm-row justify-content-end gap-2 border-top pt-4">
                    <a th:href="@{/home}" class="btn-outline-modern">Cancel</a>
                    <button type="submit" class="btn-primary-modern">
                        <i data-lucide="save" style="width: 18px; height: 18px;"></i>
                        Save changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
