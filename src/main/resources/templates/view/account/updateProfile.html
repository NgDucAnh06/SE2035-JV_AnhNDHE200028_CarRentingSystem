<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/user}">
<head>
    <meta charset="UTF-8">
    <title>Update profile</title>
    <style>
        .text-danger {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
<main layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="mb-4 text-center">
                <h3 class="mb-1 text-dark fw-bold">Update Profile</h3>
                <p class="text-muted">Keep your personal information up to date</p>
            </div>

            <div class="card-modern">
                <form th:action="@{/account/updateProfile}" th:object="${registerDTO}" method="post">
                    
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-4" style="border-radius: var(--radius-lg);">
                        <div class="d-flex align-items-center gap-2 mb-1" th:each="err : ${#fields.globalErrors()}">
                            <i data-lucide="alert-circle" style="width: 16px; height: 16px;"></i>
                            <span th:text="${err}"></span>
                        </div>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label-modern">Account Name</label>
                            <input type="text" th:field="*{accountName}" class="form-control-modern bg-light" readonly>
                            <div th:if="${#fields.hasErrors('accountName')}" th:errors="*{accountName}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label-modern">Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-modern">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-modern">Mobile Phone</label>
                            <input type="tel" th:field="*{mobile}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-modern">Birthday</label>
                            <input type="date" th:field="*{birthday}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('birthday')}" th:errors="*{birthday}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-modern">Identity Card</label>
                            <input type="text" th:field="*{identityCard}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('identityCard')}" th:errors="*{identityCard}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-modern">Licence Number</label>
                            <input type="text" th:field="*{licenceNum}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('licenceNum')}" th:errors="*{licenceNum}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label-modern">Licence Date</label>
                            <input type="date" th:field="*{licenceDate}" class="form-control-modern">
                            <div th:if="${#fields.hasErrors('licenceDate')}" th:errors="*{licenceDate}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>

                        <div class="col-12">
                            <label class="form-label-modern">Confirm Password</label>
                            <input type="password" th:field="*{password}" class="form-control-modern">
                            <small class="text-muted d-block mt-1">Please enter your password to confirm changes.</small>
                            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger mt-1" style="font-size: 0.8rem;"></div>
                        </div>
                    </div>

                    <div class="mt-5 d-flex justify-content-between align-items-center border-top pt-4">
                        <p class="mb-0 text-muted" style="font-size: 0.9rem;">
                            Already have an account? <a th:href="@{/auth/signin}" class="text-teal fw-medium text-decoration-none" style="color: var(--color-primary);">Sign in</a>
                        </p>
                        <button type="submit" class="btn-primary-modern">
                            <i data-lucide="save" style="width: 18px; height: 18px;"></i>
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
