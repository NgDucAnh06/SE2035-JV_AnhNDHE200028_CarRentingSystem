<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register Car Rental</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .form-container {
            border: 1px solid #ddd;
            padding: 20px;
            width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            border: none;
        }

        .btn-add:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .btn-submit {
            background-color: #007bff;
            color: white;
            border: none;
            width: 100%;
        }

        #selectedCarsList {
            list-style-type: none;
            padding: 0;
            margin: 0 0 10px 0;
        }

        #selectedCarsList li {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .total-price {
            font-weight: bold;
            font-size: 1.1em;
            color: #d9534f;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h2>Available Cars</h2>
    <table>
        <thead>
            <tr>
                <th>Car Name</th>
                <th>Producer</th>
                <th>Color</th>
                <th>Capacity</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="car: ${cars}">
                <td th:text="${car.carName}"></td>
                <td th:text="${car.producer.producerName}"></td>
                <td th:text="${car.color}"></td>
                <td th:text="${car.capacity}"></td>
                <td th:text="${car.rentPrice}"></td>
                <td>
                    <button type="button" class="btn-add"
                        th:attr="data-id=${car.carID}, data-name=${car.carName}, data-price=${car.rentPrice}"
                        onclick="selectCar(this)">Add</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="form-container">
        <h3>Rental Details</h3>
        <form th:action="@{/carRental/rentalRegister}" method="post" id="rentalForm">

            <div class="form-group">
                <label>Selected Cars:</label>
                <ul id="selectedCarsList">
                    <li style="color: #888;">No cars selected yet.</li>
                </ul>
                <div class="total-price" id="totalPriceDisplay">Total Price: 0.00</div>
            </div>

            <div id="hiddenCarInputs"></div>

            <div class="form-group">
                <label>Pickup Date</label>
                <input type="date" id="pickupDate" name="pickupDate" required onchange="updateTotalPriceDisplay()">
            </div>

            <div class="form-group">
                <label>Return Date</label>
                <input type="date" id="returnDate" name="returnDate" required onchange="updateTotalPriceDisplay()">
            </div>

            <button type="submit" class="btn-submit">Submit Rental Order</button>
        </form>
    </div>

    <script>
        var selectedCars = [];
        var basePricePerDay = 0.0;

        function updateTotalPriceDisplay() {
            var pickupDateStr = document.getElementById('pickupDate').value;
            var returnDateStr = document.getElementById('returnDate').value;
            var days = 0;
            
            if (pickupDateStr && returnDateStr) {
                var pickupDate = new Date(pickupDateStr);
                var returnDate = new Date(returnDateStr);
                var timeDiff = returnDate.getTime() - pickupDate.getTime();
                days = Math.ceil(timeDiff / (1000 * 3600 * 24));
                if (days < 0) days = 0;
            }
            
            var finalTotal = basePricePerDay * days;
            var daysText = days > 0 ? ' (for ' + days + ' days)' : '';
            document.getElementById('totalPriceDisplay').innerText = 'Total Price: $' + finalTotal.toFixed(2) + daysText;
        }

        function selectCar(button) {
            var carId = button.getAttribute('data-id');
            var carName = button.getAttribute('data-name');
            var carPrice = parseFloat(button.getAttribute('data-price'));

            // Check if already added
            if (selectedCars.includes(carId)) {
                return;
            }

            // Add to array
            selectedCars.push(carId);
            basePricePerDay += carPrice;

            // Update UI
            button.innerText = 'Added';
            button.disabled = true;

            // Update Selected Cars List
            var list = document.getElementById('selectedCarsList');
            if (selectedCars.length === 1) {
                list.innerHTML = ''; // Clear default message
            }
            var li = document.createElement('li');
            li.innerText = carName + ' - $' + carPrice.toFixed(2) + ' / day';
            list.appendChild(li);

            // Add hidden input for form submission
            var hiddenInput = document.createElement('input');
            hiddenInput.type = 'hidden';
            hiddenInput.name = 'carIds';
            hiddenInput.value = carId;
            document.getElementById('hiddenCarInputs').appendChild(hiddenInput);

            // Update Total Price
            updateTotalPriceDisplay();
        }
    </script>
</body>

</html>
