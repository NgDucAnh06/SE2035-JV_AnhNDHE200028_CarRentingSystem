<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <meta charset="UTF-8">
    <title>Admin Customer List</title>
</head>
<body>
<main layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0 text-dark fw-bold">Customer Management</h3>
        <button class="btn-primary-modern">
            <i data-lucide="plus" style="width: 18px; height: 18px;"></i>
            Add Customer
        </button>
    </div>

    <div th:if="${param.message}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius: var(--radius-lg);">
        <i data-lucide="check-circle" class="me-2" style="width: 18px; height: 18px; display: inline-block; vertical-align: text-bottom;"></i>
        <span th:text="${param.message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card-modern">
        <div class="table-responsive">
            <table class="table-modern">
                <thead>
                <tr>
            <th scope="col">No.</th>
            <th scope="col">Full Name</th>
            <th scope="col">Mobile</th>
            <th scope="col">Email</th>
            <th scope="col">Username</th>
            <th scope="col">Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="account, stat: ${accounts}">
            <td th:text="${stat.count}"></td>
            <td th:text="${account.customer != null ? account.customer.fullName : ''}"></td>
            <td th:text="${account.customer != null ? account.customer.mobile : ''}"></td>
            <td th:text="${account.email}"></td>
            <td th:text="${account.accountName}"></td>
            <td>
                <div class="d-flex gap-2">
                    <a class="btn-outline-modern btn-sm text-decoration-none" th:href="@{/adminCustomer/{id}(id=${account.accountID})}">
                        <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
                        View
                    </a>
                    <a class="btn-outline-modern btn-sm text-decoration-none text-danger border-danger" th:href="@{/adminCustomer/{id}/delete(id=${account.accountID})}" onclick="return confirm('Are you sure you want to delete this customer?');">
                        <i data-lucide="trash-2" style="width: 16px; height: 16px;"></i>
                        Delete
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
    </div>
</div>
</main>
</body>
</html>
