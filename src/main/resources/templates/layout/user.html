<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">FUCarRenting</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Motion One -->
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">
    <div th:replace="~{fragment/header :: header}"></div>

    <div class="container-fluid flex-grow-1 d-flex flex-column flex-md-row p-0 app-shell">
        <aside class="col-md-3 col-xl-2 sidebar-shell py-4 px-3" th:replace="~{fragment/userSidebar :: userSidebar}"></aside>

        <main class="col-md-9 col-xl-10 p-3 p-md-4 content-shell motion-container" layout:fragment="content" id="main-content">
            <p>Default content</p>
        </main>
    </div>

    <div th:replace="~{fragment/footer :: footer}"></div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Scripts Initialization -->
    <script>
        lucide.createIcons();
        const currentPath = window.location.pathname;
        document.querySelectorAll("[data-active-prefix]").forEach((link) => {
            const prefixes = link.dataset.activePrefix.split(",");
            if (prefixes.some((prefix) => currentPath.startsWith(prefix.trim()))) {
                link.classList.add("active");
            }
        });
        document.addEventListener("DOMContentLoaded", () => {
            const mainContent = document.getElementById("main-content");
            if (!mainContent) {
                return;
            }

            if (window.Motion && typeof window.Motion.animate === "function") {
                window.Motion.animate(
                    mainContent,
                    { opacity: [0, 1], y: [15, 0] },
                    { duration: 0.5, easing: "ease-out" }
                );
            } else {
                mainContent.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
